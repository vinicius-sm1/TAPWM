<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formas de criar objetos</title>
</head>
<body>
    <script>
        var aluno1 = new Object();
        aluno1.ra = "00001234";
        aluno1.nome = "Eduardo";
        alert(`ra=${aluno1.ra} nome=${aluno1.nome}`);

        var aluno2 = {};
        aluno2.ra = "1234";
        aluno2["nome"] = "Enzo";
        alert("ra=" + aluno2.ra + "nome=" +
            aluno2.nome);
        aluno2["email do aluno"] = "gabriel@gmail.com";
        alert(aluno2["email do aluno"]);

        var aluno3 = {
            ra: "7654321",
            nome: "Paulinho",
        };
        alert("ra=" + aluno3.ra + " nome=" +
            aluno3.nome);
        
        //Função construtora
        function Aluno(ra, nome) {
            this.ra = ra;
            this.nome = nome;
            this.MostraDados = function() {
                return "ra=" + this.ra + " nome=" +
                    this.nome;
            }
        }
        var aluno4 = new Aluno("123", "Lucas");
        alert(aluno4.MostraDados());
        alert(aluno4.nome);

        //Função construtora sem parâmetros
        function Aluno2() {
            var ra; //encapsulado escondido
            var nome;
            this.setRa = function(value) {
                this.ra = value;
            }
            this.getRa = function() {
                return this.ra;
            }
            this.setNome = function(value) {
                this.nome = value;
            }
            this.getNome = function() {
                return this.nome;
            }
        }
        var aluno6 = new Aluno2();
        aluno6.setNome("Pedro");
        aluno6.setRa("234");
        alert("ra=" + aluno6.getRa() + " nome=" +
            aluno6.getNome());

        //herança
        function AlunoADS() {
            var numLab;
            this.setnumLab = function(value) {
                this.numLab = value;
            }
            this.getnumLab = function() {
                return this.numLab
            }
        }
        //herança
        AlunoADS.prototype = new Aluno2();

        var aluno7 = new AlunoADS();
        aluno7.setNome("Murilo");
        aluno7.setRa("123");
        aluno7.setnumLab(5);
        alert(aluno7.getNome() + " " +
            aluno7.getnumLab());
        
        //usando class
        class Aluno1 {
            constructor() {
                this._ra;
                this._nome;
            }
            setNome(value) {
                this._nome = value;
            }
            getNome() {
                return this._nome;
            }
            setRa(value) {
                this._ra = value;
            }
            getRa() {
                return this._ra;
            }
        }
        var objAluno = new Aluno1();
        objAluno.setNome("Daniel");
        objAluno.setRa('123');
        alert(`nome=${objAluno.getNome()} ra=${objAluno.getRa()}`);

        //herança
        class AlunoADS1 extends Aluno1 {
            constructor() {
                //super chama o
                //construtor da classe pai
                super();
                this._numLab;
            }
            setNumLab(value) {
                this._numLab = value;
            }
            getNumLab() {
                return this._numLab;
            }
        }
        var objAlunoADS = new AlunoADS1();
        objAlunoADS.setNome("Richard");
        objAlunoADS.setRa("123");
        objAlunoADS.setNumLab(6);
        alert(`nome=${objAlunoADS.getNome()}
        ra=${objAlunoADS.getRa()}
        numlab=${objAlunoADS.getNumLab()}`);

        //outros

        //cópia de objetos
        var obj1 = new Object();
        var obj2 = obj1;
        obj1.nome = "Camila";
        alert(obj2.nome);

        //metodos e atributos - públicos e privados
        class ContaBancaria {
            #cpf; // atributo privado
            constructor(nome, saldoInicial) {
                this.nome = nome; //atributo publico (por causa do this)
                this.saldo = saldoInicial;
            }

            setCpf(value) {
                this.cpf = value;
            }
            getCpf() {
                return this.cpf;
            }
            getSaldo() {
                return this.saldo;
            }
            //metodo publico
            depositar(valor) {
                this.saldo += valor;
                this.#registrarTransacao(valor);
                //utilizando o modificador #
                //para metodo privado
            }

            //metodo privado
            #registrarTransacao(valor) {
                console.log(`Depósito de R$ ${valor}
                realizado pelo ${this.nome} e o
                Saldo R$ ${this.saldo} para cpf
                ${this.getCpf()} ou ${this.#cpf}`)
            }
        }

        const conta = new ContaBancaria("Gustavo", 1000);
        conta.setCpf(123);
        conta.depositar(500);
        //ver no console
    </script>
</body>
</html>
